<ion-header class="detalle-header">

  <ion-toolbar>

    <ion-buttons slot="start">
      <ion-button fill="clear" class="back-btn" (click)="volver()">
        <ion-icon name="chevron-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>

    <ion-title class="detalle-title">Detalle</ion-title>

  </ion-toolbar>

</ion-header>


<ion-content *ngIf="transaccion" class="detalle-content ion-padding">

  <!-- Fondo animado -->
  <div class="bg-layer" aria-hidden="true">
    <div class="bg-circle c1"></div>
    <div class="bg-circle c2"></div>
    <div class="bg-circle c3"></div>
  </div>

  <div class="detalle-container">

    <ion-card class="detalle-card">

      <ion-card-header>
        <ion-card-title>
          {{ transaccion.categoria }}
        </ion-card-title>
      </ion-card-header>

      <ion-card-content>

        <p>
          <strong>Tipo:</strong>
          {{ transaccion.tipo }}
        </p>

        <p>
          <strong>Monto:</strong>
          ${{ transaccion.monto }}
        </p>

        <p>
          <strong>Fecha:</strong>
          {{ transaccion.fecha | date:'mediumDate' }}
        </p>

        <p>
          <strong>Descripción:</strong>
          {{ transaccion.descripcion || 'Sin descripción' }}
        </p>

      </ion-card-content>

    </ion-card>


    <!-- Foto comprobante -->
    <ion-card *ngIf="transaccion.foto" class="photo-card">

      <app-photo-preview
        [src]="transaccion.foto"
        size="large"
        (photoClick)="abrirFoto()">
      </app-photo-preview>

    </ion-card>


    <!-- Botones -->
    <div class="btn-group">

      <ion-button expand="block" class="btn-edit" (click)="editar()">
        Editar
      </ion-button>

      <ion-button expand="block" class="btn-delete" (click)="eliminar()">
        Eliminar
      </ion-button>

    </div>

  </div>

</ion-content>
