<ion-menu side="start" contentId="main-content">

  <ion-header>
    <ion-toolbar>
      <ion-title>Menú</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content>

    <!-- PERFIL USUARIO -->
    <div class="user-box">
      <img src="assets/img/user.png" class="avatar" alt="">

      <h2>{{ userName }}</h2>

    </div>

    <!-- OPCIONES -->
    <ion-list>

      <ion-item routerLink="/tabs/tab1">
        <ion-icon name="home-outline" slot="start"></ion-icon>
        <ion-label>Dashboard</ion-label>
      </ion-item>

      <ion-item routerLink="/tabs/tab2">
        <ion-icon name="swap-horizontal-outline" slot="start"></ion-icon>
        <ion-label>Transacciones</ion-label>
      </ion-item>

      <ion-item routerLink="/tabs/tab3">
        <ion-icon name="wallet-outline" slot="start"></ion-icon>
        <ion-label>Gastos</ion-label>
      </ion-item>

      <ion-item>
        <ion-icon name="stats-chart-outline" slot="start"></ion-icon>
        <ion-label>Reportes</ion-label>
      </ion-item>

      <ion-item>
        <ion-icon name="settings-outline" slot="start"></ion-icon>
        <ion-label>Configuración</ion-label>
      </ion-item>

    </ion-list>

  </ion-content>
</ion-menu>


<div id="main-content">

  <ion-tabs>

    <ion-router-outlet></ion-router-outlet>

    <ion-tab-bar slot="bottom">

      <ion-tab-button tab="tab1">
        <ion-icon name="home-outline"></ion-icon>
        <ion-label>Dashboard</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="tab2">
        <ion-icon name="swap-horizontal-outline"></ion-icon>
        <ion-label>Transacciones</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="tab3">
        <ion-icon name="wallet-outline"></ion-icon>
        <ion-label>Gastos</ion-label>
      </ion-tab-button>

    </ion-tab-bar>

  </ion-tabs>

</div>
