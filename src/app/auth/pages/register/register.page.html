

<ion-content class="login-content">

  <div class="login-background">
    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>
    <div class="bg-circle circle-3"></div>
  </div>

  <div class="login-container">

    <div class="brand-section">
      <div class="brand-icon">
        <ion-icon name="person-add-outline"></ion-icon>
      </div>
      <h1 class="brand-title">Crear Cuenta</h1>
      <p class="brand-subtitle">Únete y controla tus finanzas</p>
    </div>

    <div class="form-card">

      <form [formGroup]="registerForm" (ngSubmit)="onRegistrar()">

        <!-- Nombre -->
        <div class="input-group">
          <label class="input-label">Nombre</label>

          <div class="input-wrapper" [class.error]="f['nombre'].touched && f['nombre'].invalid">
            <ion-icon name="person-outline" class="input-icon"></ion-icon>

            <ion-input
              formControlName="nombre"
              placeholder="Tu nombre completo"
              class="custom-input">
            </ion-input>
          </div>

          <span class="error-msg" *ngIf="f['nombre'].touched && f['nombre'].errors?.['minlength']">
            Mínimo 2 caracteres
          </span>
        </div>

        <!-- Email -->
        <div class="input-group">
          <label class="input-label">Email</label>

          <div class="input-wrapper" [class.error]="f['email'].touched && f['email'].invalid">
            <ion-icon name="mail-outline" class="input-icon"></ion-icon>

            <ion-input
              type="email"
              formControlName="email"
              placeholder="correo@ejemplo.com"
              class="custom-input">
            </ion-input>
          </div>

          <span class="error-msg" *ngIf="f['email'].touched && f['email'].errors?.['email']">
            Email inválido
          </span>
        </div>

        <!-- Password -->
        <div class="input-group">
          <label class="input-label">Contraseña</label>

          <div class="input-wrapper" [class.error]="f['password'].touched && f['password'].invalid">
            <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>

            <ion-input
              type="password"
              formControlName="password"
              placeholder="Mínimo 6 caracteres"
              class="custom-input">
            </ion-input>
          </div>

          <span class="error-msg" *ngIf="f['password'].touched && f['password'].errors?.['minlength']">
            Mínimo 6 caracteres
          </span>
        </div>

        <!-- Confirmar contraseña -->
        <div class="input-group">
          <label class="input-label">Confirmar contraseña</label>

          <div class="input-wrapper" [class.error]="registerForm.errors?.['noCoinciden'] && f['confirmar'].touched">
            <ion-icon name="shield-checkmark-outline" class="input-icon"></ion-icon>

            <ion-input
              type="password"
              formControlName="confirmar"
              placeholder="Repite tu contraseña"
              class="custom-input">
            </ion-input>
          </div>

          <span class="error-msg" *ngIf="registerForm.errors?.['noCoinciden'] && f['confirmar'].touched">
            Las contraseñas no coinciden
          </span>
        </div>

        <!-- Botón registrar -->
        <button
          type="submit"
          class="btn-primary"
          [disabled]="registerForm.invalid">

          <ion-icon name="checkmark-circle-outline"></ion-icon>
          Crear cuenta

        </button>

        <div class="divider">
          <span>¿Ya tienes cuenta?</span>
        </div>

        <!-- Ir a login -->
        <button
          type="button"
          class="btn-secondary"
          routerLink="/auth/login">

          <ion-icon name="log-in-outline"></ion-icon>
          Iniciar sesión

        </button>

      </form>

    </div>

  </div>

</ion-content>
