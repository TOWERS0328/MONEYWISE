<ion-item lines="none" class="categoria-item">

  <ion-label>

    <div class="categoria-header">

      <ion-text class="categoria-nombre">

        <strong>{{ categoria }}</strong>

      </ion-text>

      <ion-text class="categoria-monto" color="medium">

        ${{ monto }}

      </ion-text>

    </div>

    <ion-progress-bar
      [value]="porcentaje"
      [color]="color">
    </ion-progress-bar>

  </ion-label>

</ion-item>
