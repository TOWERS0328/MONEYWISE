<ion-card class="dashboard-card">

  <div class="card-top">

    <div class="icon-box">

      <ion-icon
        [name]="icono">
      </ion-icon>

    </div>

    <span class="card-title">
      {{ titulo }}
    </span>

  </div>

  <div class="card-amount">

    <app-amount-display
      [monto]="monto"
      [tipo]="tipo"
      tamano="large">
    </app-amount-display>

  </div>

</ion-card>
