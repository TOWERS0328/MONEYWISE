<ion-item>

  <ion-label position="floating">
    {{label}}
  </ion-label>

  <ion-input
  [type]="type"
  [placeholder]="placeholder"
  [value]="value"
  [disabled]="disabled"
  (ionInput)="onChange($event)">
  </ion-input>

</ion-item>

<ion-note color="danger" *ngIf="error">

{{error}}

</ion-note>
