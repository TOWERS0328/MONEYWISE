<ion-header>

  <ion-toolbar>

    <ion-title>Foto</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="cerrar()">
        Cerrar
      </ion-button>
    </ion-buttons>

  </ion-toolbar>

</ion-header>

<ion-content class="photo-container">

  <img
  *ngFor="let foto of fotos"
  [src]="foto">

</ion-content>
