<ion-header class="gallery-header">
  <ion-toolbar>
    <ion-title>Galería</ion-title>
    <ion-buttons slot="end">
      <ion-button class="close-btn" (click)="cerrar()">
        Cerrar
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="photo-container">
  <div class="photo-wrapper">
    <img *ngFor="let foto of fotos" [src]="foto" class="gallery-img" alt="">
  </div>
</ion-content>
