<ion-item>

  <ion-label>
    {{label}}
  </ion-label>

  <ion-select
  [value]="value"
  (ionChange)="onChange($event)">

    <ion-select-option
    *ngFor="let option of options"
    [value]="option">

      {{option}}

    </ion-select-option>

  </ion-select>

</ion-item>

<ion-note color="danger" *ngIf="error">

{{error}}

</ion-note>
