<ion-card>

  <ion-card-content>

    <!-- tipo -->
    <ion-segment [(ngModel)]="transaccion.tipo">

      <ion-segment-button value="gasto">
        <ion-label>Gasto</ion-label>
      </ion-segment-button>

      <ion-segment-button value="ingreso">
        <ion-label>Ingreso</ion-label>
      </ion-segment-button>

    </ion-segment>

    <!-- categoria -->
    <ion-item>
      <ion-label>Categoría</ion-label>

      <ion-select [(ngModel)]="transaccion.categoria">
        <ion-select-option value="comida">Comida</ion-select-option>
        <ion-select-option value="transporte">Transporte</ion-select-option>
        <ion-select-option value="entretenimiento">Entretenimiento</ion-select-option>
        <ion-select-option value="salario">Salario</ion-select-option>
      </ion-select>
    </ion-item>

    <!-- fecha -->
    <ion-item>
      <ion-label>Fecha</ion-label>

      <ion-datetime
        presentation="date"
        [(ngModel)]="transaccion.fecha">
      </ion-datetime>
    </ion-item>

    <!-- monto -->
    <ion-item>
      <ion-input
        type="number"
        label="Monto"
        [(ngModel)]="transaccion.monto">
      </ion-input>
    </ion-item>

    <!-- descripcion -->
    <ion-item>
      <ion-textarea
        label="Descripción"
        [(ngModel)]="transaccion.descripcion">
      </ion-textarea>
    </ion-item>

    <!-- foto -->
    <app-photo-selector
      (fotoChange)="transaccion.foto = $event ?? undefined">
    </app-photo-selector>

    <!-- botones -->
    <ion-button expand="block" (click)="guardar()">
      Guardar
    </ion-button>

    <ion-button expand="block" fill="clear" (click)="cancelar()">
      Cancelar
    </ion-button>

  </ion-card-content>

</ion-card>
